<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SpeakRight</title>
<meta name="google-site-verification" content="rhtijqT-Ruwv1ougablFpY1Xu6pvZzdri7vkwSlB2Ck" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0F0E17;color:#FFFFFE;min-height:100vh}
.app{min-height:100vh;max-width:480px;margin:0 auto;display:flex;flex-direction:column}
.welcome{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:#0F0E17;position:relative}
.welcome-logo{font-size:72px;margin-bottom:20px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.welcome h1{font-family:'Sora',sans-serif;font-size:40px;font-weight:800;color:#FFFFFE;letter-spacing:-1px;margin-bottom:8px}
.welcome h1 span{color:#4ECDC4}
.welcome-sub{color:#A7A9BE;font-size:15px;text-align:center;line-height:1.6;margin-bottom:32px;max-width:280px}
.features-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:36px;width:100%}
.feature-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:14px;text-align:center}
.feature-card .icon{font-size:22px;margin-bottom:6px}
.feature-card .text{font-size:12px;color:#A7A9BE;font-weight:500}
.made-by{color:#4ECDC4;font-size:13px;font-weight:700;margin-bottom:16px;letter-spacing:1px}
.start-btn{background:#4ECDC4;color:#0F0E17;border:none;border-radius:16px;padding:16px 48px;font-size:16px;font-weight:700;font-family:'Sora',sans-serif;cursor:pointer;width:100%;transition:all 0.2s}
.start-btn:hover{background:#3BB5AD;transform:translateY(-2px)}
.level-screen{min-height:100vh;background:#0F0E17;display:flex;flex-direction:column}
.level-header{padding:48px 24px 24px}
.level-header h2{font-family:'Sora',sans-serif;font-size:28px;font-weight:800;margin-bottom:6px}
.level-header p{color:#A7A9BE;font-size:14px}
.levels-list{padding:0 20px;flex:1}
.level-card{display:flex;align-items:center;gap:16px;border-radius:18px;padding:20px;margin-bottom:12px;cursor:pointer;transition:all 0.2s;border:2px solid transparent}
.level-card:hover{transform:translateX(4px)}
.level-icon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.level-name{font-family:'Sora',sans-serif;font-weight:700;font-size:16px;margin-bottom:4px}
.level-desc{font-size:13px;color:#A7A9BE}
.topic-screen{min-height:100vh;background:#0F0E17;display:flex;flex-direction:column}
.topic-header{padding:48px 24px 24px}
.topic-header h2{font-family:'Sora',sans-serif;font-size:28px;font-weight:800;margin-bottom:6px}
.topic-header p{color:#A7A9BE;font-size:14px}
.level-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;margin-bottom:12px}
.topics-list{padding:0 20px;flex:1}
.topic-card{display:flex;align-items:center;gap:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:18px 20px;margin-bottom:12px;cursor:pointer;transition:all 0.2s}
.topic-card:hover{background:rgba(255,255,255,0.08);transform:translateX(4px)}
.topic-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.topic-name{font-family:'Sora',sans-serif;font-weight:700;font-size:15px;margin-bottom:3px}
.topic-desc{color:#A7A9BE;font-size:13px}
.stats-bar{margin:16px 20px 24px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:16px 20px;display:flex;justify-content:space-around}
.stat{text-align:center}
.stat-num{font-family:'Sora',sans-serif;font-size:22px;font-weight:800}
.stat-label{font-size:11px;color:#A7A9BE;margin-top:2px}
.xp-bar-wrap{margin:0 20px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:18px;padding:14px 20px}
.xp-label{display:flex;justify-content:space-between;font-size:12px;color:#A7A9BE;margin-bottom:8px}
.xp-bar{height:8px;background:rgba(255,255,255,0.1);border-radius:10px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,#4ECDC4,#A78BFA);border-radius:10px;transition:width 0.5s ease}
.badges-row{display:flex;gap:8px;flex-wrap:wrap;margin:0 20px 16px}
.badge{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600}
.badge.earned{background:rgba(78,205,196,0.15);border-color:rgba(78,205,196,0.4);color:#4ECDC4}
.chat-screen{min-height:100vh;background:#0F0E17;display:flex;flex-direction:column}
.chat-header{padding:44px 20px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,0.06)}
.back-btn{background:rgba(255,255,255,0.06);border:none;color:#FFFFFE;border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
.chat-topic-name{font-family:'Sora',sans-serif;font-weight:700;font-size:15px}
.chat-topic-sub{font-size:12px;color:#A7A9BE;margin-top:1px}
.streak-badge{background:rgba(255,107,107,0.15);border:1px solid rgba(255,107,107,0.3);border-radius:10px;padding:4px 10px;font-size:13px;font-weight:700;color:#FF6B6B}
.mode-toggle{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#FFFFFE;border-radius:10px;padding:4px 10px;font-size:13px;cursor:pointer;font-weight:600}
.messages{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column}
.message-row{display:flex;flex-direction:column;margin-bottom:12px}
.message-row.user{align-items:flex-end}
.message-row.bot{align-items:flex-start}
.bubble{max-width:78%;padding:12px 16px;border-radius:20px;font-size:14px;line-height:1.55}
.bubble.user{background:#4ECDC4;color:#0F0E17;border-bottom-right-radius:6px;font-weight:500}
.bubble.bot{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:#FFFFFE;border-bottom-left-radius:6px}
.correction-box{max-width:90%;margin-top:6px;background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:12px 14px}
.sentence-display{font-size:14px;line-height:1.8;margin-bottom:8px;flex-wrap:wrap;display:flex;gap:2px;align-items:baseline}
.word-wrong{color:#FF6B6B;text-decoration:line-through;font-weight:600}
.word-normal{color:#FFFFFE}
.correction-item{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.06)}
.correction-item:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.correction-wrong{color:#FF6B6B;font-size:13px;font-weight:600;text-decoration:line-through}
.correction-arrow{color:#A7A9BE;font-size:13px;margin:0 6px}
.correction-right{color:#4ECDC4;font-size:13px;font-weight:700}
.correction-suggest{color:#FFB347;font-size:13px;font-weight:600}
.correction-explain{font-size:12px;color:#A7A9BE;margin-top:4px;line-height:1.5}
.type-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;margin-bottom:4px}
.type-error{background:rgba(255,107,107,0.2);color:#FF6B6B}
.type-suggest{background:rgba(255,179,71,0.2);color:#FFB347}
.typing-indicator{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:20px;border-bottom-left-radius:6px;padding:12px 16px;font-size:13px;color:#A7A9BE;font-style:italic}
.input-area{padding:12px 16px 24px;border-top:1px solid rgba(255,255,255,0.06);display:flex;gap:8px;align-items:flex-end}
.message-input{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:12px 16px;color:#FFFFFE;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;resize:none}
.message-input::placeholder{color:#555770}
.message-input:focus{border-color:rgba(78,205,196,0.4)}
.send-btn{width:44px;height:44px;background:#4ECDC4;border:none;border-radius:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:18px;font-weight:700;color:#0F0E17}
.send-btn:disabled{background:rgba(78,205,196,0.3);cursor:not-allowed}
.mic-btn{background:rgba(255,255,255,0.1);color:#FFFFFE;transition:all 0.2s}
.mic-btn.listening{background:#FF6B6B;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#4ECDC4;color:#0F0E17;padding:10px 20px;border-radius:20px;font-weight:700;font-size:14px;z-index:999;animation:fadeInOut 2.5s ease forwards;white-space:nowrap}
@keyframes fadeInOut{0%{opacity:0;top:30px}15%{opacity:1;top:20px}80%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useRef,useEffect}=React;

const LEVELS=[
{id:"easy",emoji:"🌱",label:"Easy",desc:"For beginners — gentle corrections only",color:"#4ECDC4",bg:"rgba(78,205,196,0.1)",border:"rgba(78,205,196,0.3)"},
{id:"intermediate",emoji:"🔥",label:"Intermediate",desc:"Balanced — good for everyday learners",color:"#FFD93D",bg:"rgba(255,217,61,0.1)",border:"rgba(255,217,61,0.3)"},
{id:"advanced",emoji:"⚡",label:"Advanced",desc:"Pro level — strict grammar & punctuation",color:"#FF6B6B",bg:"rgba(255,107,107,0.1)",border:"rgba(255,107,107,0.3)"},
];

const TOPICS=[
{id:"random",emoji:"💬",label:"Random Chat",description:"Casual everyday conversation",color:"#4ECDC4"},
{id:"job",emoji:"💼",label:"Job Interview",description:"Practice professional English",color:"#FF6B6B"},
{id:"restaurant",emoji:"🍽️",label:"At a Restaurant",description:"Order food, talk to staff",color:"#FFD93D"},
{id:"student",emoji:"🎓",label:"Student Life",description:"School & college conversations",color:"#A78BFA"},
{id:"travel",emoji:"✈️",label:"Travel",description:"Airports, hotels & directions",color:"#4ECDC4"},
{id:"shopping",emoji:"🛍️",label:"Shopping",description:"Buy clothes, bargain & more",color:"#FF6B6B"},
{id:"doctor",emoji:"🏥",label:"Doctor Visit",description:"Explain symptoms, ask questions",color:"#45B7D1"},
{id:"phone",emoji:"📞",label:"Phone Call",description:"Talk formally on the phone",color:"#FFD93D"},
];

const BADGE_LIST=[
{id:"first",emoji:"🌟",label:"First Message"},
{id:"perfect5",emoji:"✅",label:"5 Perfect Sentences"},
{id:"streak3",emoji:"🔥",label:"3 Streak"},
{id:"streak7",emoji:"🏆",label:"7 Streak"},
{id:"xp100",emoji:"💎",label:"100 XP"},
];

const getSys=(topic,level,topicId,learningMode)=>{
const informal=topicId==="random"?"Reply in a casual, friendly, informal way like a real friend texting.":"Reply in a natural, context-appropriate way.";
const correctionNote=learningMode?"":"Do NOT provide any corrections array. Just chat naturally.";
const rules={
easy:`You are a kind English conversation partner for BEGINNERS. Scenario: ${topic}. ${informal} ${correctionNote}
Reply ONLY with raw JSON. No text outside JSON.
Format: {"reply":"your response — always end with a follow-up question","corrections":[{"wrong":"ONLY the incorrect word or phrase","correct":"corrected version","explanation":"simple friendly explanation","type":"error"}],"isCorrect":true/false}
RULES: Max 1 correction. Only major errors. If correct, return [] and isCorrect:true`,
intermediate:`You are a helpful English conversation partner for INTERMEDIATE learners. Scenario: ${topic}. ${informal} ${correctionNote}
Reply ONLY with raw JSON. No text outside JSON.
Format: {"reply":"your response — always end with a follow-up question","corrections":[{"wrong":"ONLY the incorrect word or phrase","correct":"corrected version","explanation":"clear explanation","type":"error or suggestion"}],"isCorrect":true/false}
RULES: Max 2 corrections. Correct real grammar mistakes only.`,
advanced:`You are a strict English conversation partner for ADVANCED learners. Scenario: ${topic}. ${informal} ${correctionNote}
Reply ONLY with raw JSON. No text outside JSON.
Format: {"reply":"your response — always end with a follow-up question","corrections":[{"wrong":"ONLY the incorrect word or phrase","correct":"corrected version","explanation":"detailed explanation","type":"error or suggestion"}],"isCorrect":true/false}
RULES: Correct ALL mistakes strictly. Grammar, tense, punctuation, articles.`
};
return rules[level];
};

const highlightSentence=(sentence,corrections)=>{
if(!corrections||corrections.length===0)return null;
let result=sentence;
corrections.forEach(c=>{result=result.replace(c.wrong,`%%WRONG%%${c.wrong}%%ENDWRONG%%`)});
const parts=result.split(/(%%WRONG%%.*?%%ENDWRONG%%)/g);
return parts.map((part,i)=>{
if(part.startsWith("%%WRONG%%")){
const word=part.replace("%%WRONG%%","").replace("%%ENDWRONG%%","");
return React.createElement("span",{key:i,className:"word-wrong"},word);
}
return React.createElement("span",{key:i,className:"word-normal"},part);
});
};

const buildCorrectSentence=(original,corrections)=>{
let result=original;
corrections?.forEach(c=>{result=result.replace(c.wrong,c.correct)});
return result;
};

const call=async(h,sys)=>{
const r=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({messages:h,system:sys})});
const d=await r.json();
return d.content;
};

const parse=(t)=>{try{return JSON.parse(t.replace(/```json|```/g,"").trim())}catch{return{reply:t,corrections:[],isCorrect:true}}};

const loadSaved=()=>{
try{const s=localStorage.getItem("speakright_v2");return s?JSON.parse(s):{correct:0,mistakes:0,streak:0,xp:0,badges:[]};}
catch{return{correct:0,mistakes:0,streak:0,xp:0,badges:[]};}
};

function App(){
const[screen,setScreen]=useState("welcome");
const[level,setLevel]=useState(null);
const[topic,setTopic]=useState(null);
const[msgs,setMsgs]=useState([]);
const[input,setInput]=useState("");
const[loading,setLoading]=useState(false);
const[hist,setHist]=useState([]);
const[stats,setStats]=useState(loadSaved);
const[listening,setListening]=useState(false);
const[learningMode,setLearningMode]=useState(true);
const[toast,setToast]=useState(null);
const endRef=useRef(null);
const inputRef=useRef(null);
const recognitionRef=useRef(null);

useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"})},[msgs,loading]);
useEffect(()=>{localStorage.setItem("speakright_v2",JSON.stringify(stats));},[stats]);

const showToast=(msg)=>{setToast(msg);setTimeout(()=>setToast(null),2500);};

const checkBadges=(ns)=>{
const e=[...ns.badges];
if(!e.includes("first")&&ns.correct>=1){e.push("first");showToast("🌟 Badge: First Message!");}
if(!e.includes("perfect5")&&ns.correct>=5){e.push("perfect5");showToast("✅ Badge: 5 Perfect Sentences!");}
if(!e.includes("streak3")&&ns.streak>=3){e.push("streak3");showToast("🔥 Badge: 3 Streak!");}
if(!e.includes("streak7")&&ns.streak>=7){e.push("streak7");showToast("🏆 Badge: 7 Streak!");}
if(!e.includes("xp100")&&ns.xp>=100){e.push("xp100");showToast("💎 Badge: 100 XP!");}
return e;
};

const startListen=()=>{
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR){alert("Voice input needs Chrome browser!");return;}
const r=new SR();
r.lang="en-US";r.continuous=false;r.interimResults=false;
r.onstart=()=>setListening(true);
r.onend=()=>setListening(false);
r.onresult=(e)=>setInput(e.results[0][0].transcript);
r.onerror=()=>setListening(false);
recognitionRef.current=r;r.start();
};

const stopListen=()=>{recognitionRef.current?.stop();setListening(false);};

const selectLevel=(lv)=>{setLevel(lv);setScreen("topic");};

const startTopic=async(tp)=>{
setTopic(tp);setMsgs([]);setHist([]);setScreen("chat");setLoading(true);
const h=[{role:"user",content:"Start the conversation with a friendly opening line and a question."}];
const text=await call(h,getSys(tp.label,level.id,tp.id,learningMode));
const p=parse(text);
setMsgs([{role:"bot",content:p.reply}]);
setHist([...h,{role:"assistant",content:text}]);
setLoading(false);
setTimeout(()=>inputRef.current?.focus(),100);
};

const send=async()=>{
if(!input.trim()||loading)return;
const m=input.trim();setInput("");setLoading(true);
const entry={role:"user",content:m,corrections:null,isCorrect:null};
setMsgs(prev=>[...prev,entry]);
const nh=[...hist,{role:"user",content:m}];
const text=await call(nh,getSys(topic.label,level.id,topic.id,learningMode));
const p=parse(text);
const xpGain=p.isCorrect?10:3;
setStats(prev=>{
const ns={correct:p.isCorrect?prev.correct+1:prev.correct,mistakes:prev.mistakes+(p.corrections?.length||0),streak:p.isCorrect?prev.streak+1:0,xp:prev.xp+xpGain,badges:prev.badges};
ns.badges=checkBadges(ns);
return ns;
});
const correctedSentence=buildCorrectSentence(m,p.corrections);
setMsgs(prev=>{const u=[...prev];u[u.length-1]={...entry,corrections:p.corrections||[],isCorrect:p.isCorrect,correctedSentence};return[...u,{role:"bot",content:p.reply}]});
setHist([...nh,{role:"assistant",content:text}]);
setLoading(false);
setTimeout(()=>inputRef.current?.focus(),100);
};

const xpLevel=Math.floor(stats.xp/100)+1;
const xpProgress=stats.xp%100;

if(screen==="welcome")return(
<div className="app"><div className="welcome">
{toast&&<div className="toast">{toast}</div>}
<div className="welcome-logo">🗣️</div>
<h1>Speak<span>Right</span></h1>
<p className="welcome-sub">Chat in English. Make mistakes. Learn instantly.</p>
<div className="features-grid">
<div className="feature-card"><div className="icon">✍️</div><div className="text">Grammar Correction</div></div>
<div className="feature-card"><div className="icon">🎤</div><div className="text">Voice Input</div></div>
<div className="feature-card"><div className="icon">🏆</div><div className="text">XP & Badges</div></div>
<div className="feature-card"><div className="icon">💾</div><div className="text">Progress Saved</div></div>
</div>
<p className="made-by">✦ Made by Arshad ✦</p>
<button className="start-btn" onClick={()=>setScreen("level")}>Start Practicing →</button>
</div></div>
);

if(screen==="level")return(
<div className="app"><div className="level-screen">
{toast&&<div className="toast">{toast}</div>}
<div className="level-header"><h2>Choose Your Level</h2><p>Pick the level that matches your English</p></div>
<div className="levels-list">
{LEVELS.map(lv=>(
<div className="level-card" key={lv.id} onClick={()=>selectLevel(lv)} style={{background:lv.bg,border:`2px solid ${lv.border}`}}>
<div className="level-icon" style={{background:lv.color+"33"}}>{lv.emoji}</div>
<div style={{flex:1}}><div className="level-name" style={{color:lv.color}}>{lv.label}</div><div className="level-desc">{lv.desc}</div></div>
<div style={{color:"#A7A9BE",fontSize:20}}>›</div>
</div>
))}
</div>
</div></div>
);

if(screen==="topic")return(
<div className="app"><div className="topic-screen">
{toast&&<div className="toast">{toast}</div>}
<div className="topic-header">
<div className="level-badge" style={{background:level.bg,color:level.color,border:`1px solid ${level.border}`}}>{level.emoji} {level.label} Level</div>
<h2>Choose a Scenario</h2><p>Pick a situation to practice</p>
</div>
<div className="xp-bar-wrap">
<div className="xp-label"><span>⭐ Level {xpLevel}</span><span>{stats.xp} XP total</span></div>
<div className="xp-bar"><div className="xp-fill" style={{width:`${xpProgress}%`}}/></div>
</div>
{stats.badges.length>0&&(
<div className="badges-row">
{BADGE_LIST.filter(b=>stats.badges.includes(b.id)).map(b=>(
<div key={b.id} className="badge earned">{b.emoji} {b.label}</div>
))}
</div>
)}
<div className="topics-list">
{TOPICS.map(tp=>(
<div className="topic-card" key={tp.id} onClick={()=>startTopic(tp)}>
<div className="topic-icon" style={{background:tp.color+"22"}}>{tp.emoji}</div>
<div style={{flex:1}}><div className="topic-name">{tp.label}</div><div className="topic-desc">{tp.description}</div></div>
<div style={{color:"#A7A9BE",fontSize:18}}>›</div>
</div>
))}
</div>
<div className="stats-bar">
<div className="stat"><div className="stat-num" style={{color:"#4ECDC4"}}>{stats.correct}</div><div className="stat-label">CORRECT</div></div>
<div className="stat"><div className="stat-num" style={{color:"#FF6B6B"}}>{stats.mistakes}</div><div className="stat-label">FIXED</div></div>
<div className="stat"><div className="stat-num" style={{color:"#FFD93D"}}>🔥{stats.streak}</div><div className="stat-label">STREAK</div></div>
</div>
</div></div>
);

return(
<div className="app"><div className="chat-screen">
{toast&&<div className="toast">{toast}</div>}
<div className="chat-header">
<button className="back-btn" onClick={()=>setScreen("topic")}>‹</button>
<div style={{flex:1}}><div className="chat-topic-name">{topic?.emoji} {topic?.label}</div><div className="chat-topic-sub">{level?.emoji} {level?.label} • {learningMode?"📘 Learning":"🟢 Practice"}</div></div>
<button className="mode-toggle" onClick={()=>setLearningMode(m=>!m)} title="Toggle mode">{learningMode?"📘":"🟢"}</button>
<div className="streak-badge">🔥{stats.streak}</div>
</div>
<div className="messages">
{msgs.map((msg,i)=>(
<div key={i} className={`message-row ${msg.role}`}>
<div className={`bubble ${msg.role}`}>{msg.content}</div>
{msg.role==="user"&&msg.isCorrect===true&&msg.corrections!==null&&(
<div style={{fontSize:11,color:"#4ECDC4",fontWeight:600,marginTop:5}}>✅ Perfect! +10 XP</div>
)}
{msg.role==="user"&&msg.corrections&&msg.corrections.length>0&&(
<div className="correction-box">
{msg.correctedSentence&&<div style={{color:"#4ECDC4",fontWeight:600,marginBottom:8}}>✅ {msg.correctedSentence}</div>}
<div className="sentence-display">{highlightSentence(msg.content,msg.corrections)||msg.content}</div>
{msg.corrections.map((c,j)=>(
<div key={j} className="correction-item">
<div className={`type-badge ${c.type==="suggestion"?"type-suggest":"type-error"}`}>{c.type==="suggestion"?"💡 Suggestion":"❌ Error"}</div>
<div><span className="correction-wrong">{c.wrong}</span><span className="correction-arrow">→</span><span className={c.type==="suggestion"?"correction-suggest":"correction-right"}>{c.correct}</span></div>
<div className="correction-explain">📘 {c.explanation}</div>
</div>
))}
</div>
)}
</div>
))}
{loading&&<div className="message-row bot"><div className="typing-indicator">SpeakRight is typing...</div></div>}
<div ref={endRef}/>
</div>
<div className="input-area">
<textarea ref={inputRef} className="message-input" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send()}}} placeholder="Type or speak in English..." rows={1}/>
<button className={`send-btn mic-btn ${listening?"listening":""}`} onClick={listening?stopListen:startListen}>🎤</button>
<button className="send-btn" onClick={send} disabled={loading||!input.trim()}>↑</button>
</div>
</div></div>
);
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
